name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            BODY=$(git log --pretty=format:"- %s" HEAD)
          else
            BODY=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$BODY"
            echo ""
            echo "---"
            echo "See the assets to download and install this version."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (universal binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CandleKeep Desktop ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Generate and upload SHA256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg/
          shasum -a 256 *.dmg > SHA256SUMS
          gh release upload ${{ github.ref_name }} SHA256SUMS --clobber

  check:
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
